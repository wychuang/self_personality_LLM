# Default configuration — all experiments extend this
model:
  name: "EleutherAI/pythia-160m"
  device_map: "auto"
  torch_dtype: "bfloat16"
  use_cache: false
  trust_remote_code: true

training:
  seed: 42
  output_dir: "data/results"
  per_device_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_steps: 100
  max_steps: 1000
  logging_steps: 10
  eval_steps: 100
  save_steps: 500
  bf16: true
  gradient_checkpointing: true

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["query_key_value"]

wandb:
  project: "self_personality_llm"
  entity: null
  mode: "offline"  # "online" or "offline"
